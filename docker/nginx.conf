# The server block defines a virtual web server to handle incoming web requests.
# It acts as the "front door" for your application.
server {
    # listen: Tells Nginx to listen for incoming HTTP traffic on port 80 inside the container.
    # This is the standard port for unencrypted web traffic.
    listen 80;

    # index: Defines the default file to look for when a user visits a directory (like your root domain).
    # Nginx will look for index.php first, and if it's not found, look for index.html.
    index index.php index.html;

    # root: Sets the base directory for web requests to Laravel's 'public' folder.
    # CRITICAL SECURITY STEP: This prevents users from directly accessing your source code
    # (like the app folder) or sensitive files (like .env) because Nginx only serves
    # files located inside /var/www/html/public.
    root /var/www/html/public;

    # client_max_body_size: Allows larger file uploads (e.g., images, videos up to 100 Megabytes).
    # By default, Nginx restricts this to a very small size (1MB).
    client_max_body_size 100M;

    # -- THE FRONT CONTROLLER PATTERN --
    # This location block handles all standard URL requests (like /about, /users, etc.).
    # It routes traffic logically based on what exists on the server.
    location / {
        # try_files does exactly what it sounds like, checking in this specific order:
        # 1. $uri   -> Does a file exist at this exact path? (e.g., an image or CSS file like /css/style.css) -> Serve it directly.
        # 2. $uri/  -> Does a directory exist at this exact path? -> Serve its index file.
        # 3. /index.php?$query_string -> If neither a file nor directory exists, send EVERYTHING to Laravel's index.php router.
        # This last step is what makes clean URLs (like /users instead of index.php?page=users) possible in Laravel.
        try_files $uri $uri/ /index.php?$query_string;
    }

    # -- THE PHP HANDOFF (PHP-FPM) --
    # This block is triggered only when a URL ends in .php (or when the front controller above forwards traffic to index.php).
    # Nginx itself cannot run PHP code; it needs to hand it off to a PHP processor.
    location ~ \.php$ {
        # Security check: If the requested PHP file doesn't actually exist, return a 404 (Not Found) error immediately.
        try_files $uri =404;   

        # Split the URL into the PHP script name and the extra path info that follows it.
        # Required by some PHP applications to understand complex URLs.
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # fastcgi_pass: The BRIDGE! This sends the PHP request over to the 'app' container on port 9000.
        # Nginx says: "Hey 'app' container (which runs PHP-FPM), I don't read PHP. Execute this and give me the HTML result back."
        fastcgi_pass app:9000;

        # Sets the default file to execute if none is specified in a FastCGI request.
        fastcgi_index index.php;

        # Includes standard variable mapping rules provided by Nginx for FastCGI.
        include fastcgi_params;

        # Sets the SCRIPT_FILENAME variable. This is crucial: it tells the PHP container 
        # the exact, absolute path to the PHP script it needs to execute on its own hard drive.
        # ($document_root is /var/www/html/public, $fastcgi_script_name is usually /index.php)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Set the PATH_INFO variable (often used for nested or complex routes in PHP).
        fastcgi_param PATH_INFO $fastcgi_path_info;
    } 

    # --- SECURITY ---
    # This block catches requests for hidden files or directories (files starting with a dot, like .env, .git, .htaccess).
    location ~ /\.(?!well-known).* {
        # deny all: Immediately rejects the request with a Forbidden error.
        # Important just in case sensitive files accidentally end up in the public folder.
        # The exception is .well-known, which is needed by services like Let's Encrypt for SSL certificates.
        deny all;
    }
}